# fly.toml — AI DISCO BOT (Telegram polling worker, no HTTP).
#
# IMPORTANT: do NOT re-add [http_service]! Our bot doesn't listen on HTTP.
# Fly's HTTP health-check would fail and roll back every deploy after ~50s.
# If you ever re-run `fly launch`, it will add [http_service] back —
# delete it again before deploying.

app = 'telegram-ai--bot'
primary_region = 'fra'

[experimental]
  auto_rollback = true

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
