# fly.toml — AI DISCO BOT (Telegram polling worker, no HTTP).
# Generated by `fly launch`, then trimmed:
#   - removed [http_service] block: we don't listen on HTTP at all.
#     With it present, Fly would health-check port 8080, fail, and roll
#     back the deploy after ~50 seconds (the "Failed, took 50s" launch).
#   - removed `auto_stop_machines = 'stop'`: a polling bot must run 24/7.

app = 'telegram-ai--bot'
primary_region = 'fra'

[experimental]
  auto_rollback = true

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
