# nginx vhost for AI DISCO BOT.
# Place at: /etc/nginx/sites-available/disco-ai-bot.conf
# Symlink:  ln -s /etc/nginx/sites-available/disco-ai-bot.conf /etc/nginx/sites-enabled/
# Then:     sudo nginx -t && sudo systemctl reload nginx
#
# IMPORTANT — get TLS first:
#   sudo certbot --nginx -d disco.example.com
# Certbot will edit this file to add the SSL block and the redirect.

# Drop requests with an unexpected Host header (no SNI match) — defense
# against a misconfigured DNS or scanning.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

# Rate-limit zone shared across both webhook + Mini-App API endpoints.
# 20 req/sec sustained per source IP, burst 50, then drop.
limit_req_zone $binary_remote_addr zone=disco_api:10m rate=20r/s;

server {
    listen 80;
    listen [::]:80;
    server_name disco.example.com;

    # All HTTP traffic redirects to HTTPS after certbot runs.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name disco.example.com;

    # certbot will fill in ssl_certificate and ssl_certificate_key for you.
    # ssl_certificate     /etc/letsencrypt/live/disco.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/disco.example.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # ===== Security headers =====
    # HSTS — long-lived once you're sure the cert auto-renews
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP — the Mini App needs to be framed by Telegram (web.telegram.org) and
    # must load telegram-web-app.js. inline <script> is required by the
    # current Mini App HTML, so 'unsafe-inline' on script-src is intentional;
    # consider migrating to a CSP nonce when iterating on the dashboard.
    add_header Content-Security-Policy "default-src 'self'; \
script-src 'self' 'unsafe-inline' https://telegram.org; \
style-src 'self' 'unsafe-inline'; \
img-src 'self' data:; \
connect-src 'self'; \
frame-ancestors https://web.telegram.org https://*.telegram.org" always;

    # Reverse-proxy everything to the bot's HTTP server on localhost.
    # Match the WEBHOOK_PORT you set in /etc/disco-ai-bot/disco-ai-bot.env.
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }

    # NOWPayments IPN — apply rate limit (HMAC is expensive) + no buffering.
    location /webhook/nowpayments {
        limit_req zone=disco_api burst=50 nodelay;
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Mini App profile API — also rate-limited (init_data HMAC is expensive).
    location /api/ {
        limit_req zone=disco_api burst=50 nodelay;
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Health probe used by uptime monitors.
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:8081/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Reasonable safety limits — bot accepts only small JSON bodies.
    client_max_body_size 2m;
}
